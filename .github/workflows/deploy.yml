name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

  # Consente di eseguire questo flusso di lavoro manualmente dalla scheda Actions
  workflow_dispatch:

# Imposta i permessi del GITHUB_TOKEN per consentire il deployment su GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permette una sola operazione di deploy alla volta (annulla quelle in coda)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Lavoro per la costruzione
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Imposta Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installa le dipendenze
        run: npm ci

      - name: Create .env file for build
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}" >> .env

      - name: Build del progetto
        run: npm run build

      - name: Upload degli artifacts di GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # Lavoro per il deploy effettivo
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
